name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-features

      - name: Check no-default-features
        run: cargo check --no-default-features

      - name: Check examples
        run: cargo check --examples --all-features

      - name: Docs
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -Dwarnings

      - name: Build docs website
        working-directory: website
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm build

  validate-version:
    name: Validate version
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract tag version
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check Cargo.toml version
        run: |
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$CARGO_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "ERROR: Cargo.toml version '${CARGO_VERSION}' does not match tag version '${{ steps.tag.outputs.version }}'"
            exit 1
          fi
          echo "Cargo.toml version OK: ${CARGO_VERSION}"

      - name: Check CHANGELOG.md contains version heading
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          if ! grep -qE "^##[[:space:]].*${VERSION}" CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md does not contain a heading for version '${VERSION}'"
            exit 1
          fi
          echo "CHANGELOG.md heading OK for version: ${VERSION}"

  publish-rust:
    name: Publish (crates.io)
    runs-on: ubuntu-latest
    needs: validate-version
    environment: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish-rust
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract tag version
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          NOTES=$(awk "/^##[[:space:]].*${VERSION}/{found=1; next} found && /^##[[:space:]]/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          printf '%s' "$NOTES" > /tmp/release-notes.md
          echo "notes_file=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file "${{ steps.notes.outputs.notes_file }}"
